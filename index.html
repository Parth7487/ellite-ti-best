<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Recents – Figma</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchVal = originalFetch;
          
          try {
            delete window.fetch;
          } catch (e) {}

          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchVal || originalFetch;
            },
            set: function(val) {
              fetchVal = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var proto = Object.getPrototypeOf(window) || Window.prototype;
            if (proto) {
              try {
                delete proto.fetch;
              } catch (err) {}
              
              var customFetch = window.fetch;
              Object.defineProperty(proto, 'fetch', {
                get: function() {
                  return customFetch || originalFetch;
                },
                set: function(val) {
                  customFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (err2) {
            console.warn("Unable to fully shim fetch:", err2);
          }
        }
      })();
    </script>
    <script>
      // Disable right-click completely using capture phase
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, true);

      // Block developer shortcuts in capture phase
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
            ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key.toLowerCase() === 'i' || e.key.toLowerCase() === 'c' || e.key.toLowerCase() === 'j')) ||
            (e.metaKey && e.altKey && (e.key.toLowerCase() === 'i' || e.key.toLowerCase() === 'c' || e.key.toLowerCase() === 'j')) ||
            ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u') ||
            (e.metaKey && e.altKey && e.key.toLowerCase() === 'u') ||
            ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's')
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
